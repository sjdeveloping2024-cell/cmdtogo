<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Student Login – Pick-A-Book</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif}
body{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#0a2540,#1e3c72);padding:20px}
.card{background:#fff;border-radius:16px;padding:44px 36px;width:100%;max-width:400px;box-shadow:0 20px 50px rgba(0,0,0,.3);text-align:center}
.logo{font-size:56px;margin-bottom:12px}
h2{color:#0a2540;font-size:22px;margin-bottom:6px}
.sub{color:#64748b;font-size:13px;margin-bottom:24px}
.flash{background:#fee2e2;color:#b91c1c;border:1px solid #fca5a5;border-radius:8px;padding:10px 14px;font-size:13px;margin-bottom:16px;text-align:left}
label{display:block;text-align:left;font-size:12px;font-weight:700;color:#64748b;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
.input-wrap{position:relative;margin-bottom:20px}
.input-icon{position:absolute;left:13px;top:50%;transform:translateY(-50%);font-size:17px}
input{width:100%;padding:13px 13px 13px 42px;border:2px solid #e2e8f0;border-radius:9px;font-size:15px;outline:none;transition:.2s;box-sizing:border-box}
input:focus{border-color:#2563eb;box-shadow:0 0 0 3px rgba(37,99,235,.1)}
button{width:100%;padding:13px;background:#2563eb;color:#fff;border:none;border-radius:9px;font-size:15px;font-weight:700;cursor:pointer;transition:.2s}
button:hover{background:#1d4ed8}
.hint{margin-top:16px;font-size:12px;color:#94a3b8}
</style>
</head>
<body>
<div class="card">
  <div class="logo">📚</div>
  <h2>Pick-A-Book</h2>
  <p class="sub">Student Portal — enter your Student ID</p>
  {% with messages = get_flashed_messages() %}
    {% if messages %}{% for m in messages %}<div class="flash">⚠️ {{ m }}</div>{% endfor %}{% endif %}
  {% endwith %}
  <form action="{{ url_for('student_login_process') }}" method="POST">
    <label>Student ID</label>
    <div class="input-wrap">
      <span class="input-icon">🎓</span>
      <input type="text" name="student_id" placeholder="e.g. 2024-0001" autocomplete="off" autofocus required>
    </div>
    <button type="submit">Enter Portal →</button>
  </form>
  <p class="hint">Don't have an account? Ask your librarian to register you.</p>
</div>
</body>
</html>
