<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Register – Pick-A-Book</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif}
body{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#0a2540,#1e3c72)}
.card{background:#fff;border-radius:12px;padding:40px;width:360px;box-shadow:0 15px 40px rgba(0,0,0,.25);text-align:center}
h2{color:#0a2540;margin-bottom:24px;font-size:22px}
.flash{background:#fee2e2;color:#b91c1c;border:1px solid #fca5a5;border-radius:8px;padding:10px 14px;font-size:13px;margin-bottom:16px;text-align:left}
input{width:100%;padding:12px 14px;margin-bottom:14px;border:2px solid #e2e8f0;border-radius:8px;font-size:15px;outline:none;transition:.2s}
input:focus{border-color:#2563eb;box-shadow:0 0 0 3px rgba(37,99,235,.12)}
button{width:100%;padding:13px;background:#2563eb;color:#fff;border:none;border-radius:8px;font-size:15px;font-weight:700;cursor:pointer;transition:.2s}
button:hover{background:#1d4ed8}
a{display:block;margin-top:14px;font-size:13px;color:#2563eb;text-decoration:none}
a:hover{text-decoration:underline}
</style>
</head>
<body>
<div class="card">
  <h2>📚 Librarian Registration</h2>
  {% with messages = get_flashed_messages() %}
    {% if messages %}{% for m in messages %}<div class="flash">⚠️ {{ m }}</div>{% endfor %}{% endif %}
  {% endwith %}
  <form action="{{ url_for('register_process') }}" method="POST">
    <input type="text"     name="name"     placeholder="Full Name"      required>
    <input type="email"    name="email"    placeholder="Email Address"  required>
    <input type="password" name="password" placeholder="Password (6+ chars)" required>
    <button type="submit">Register</button>
  </form>
  <a href="{{ url_for('login_page') }}">← Back to Login</a>
</div>
</body>
</html>
